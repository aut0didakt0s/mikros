[pytest]
# Benchmark-local pytest config. Overrides repo-root pyproject.toml
# [tool.pytest.ini_options] so benchmark runs are not instrumented by
# pytest-cov (which inflates timings ~20%) and do not inherit the
# tests/-focused testpaths / markers filter.
addopts = --benchmark-only
pythonpath = ..
testpaths = .
python_files = bench_*.py
python_functions = bench_*
