name: essay
description: Guided essay workflow — from exploration to polished prose.
category: writing_communication
output_format: text

steps:
  - id: explore
    title: Explore and Invent
    directive_template: >-
      First, ask the user what topic they want to write about. Do NOT guess or infer the topic from the tool name, prior conversation, or the context field — wait for the user to state it.
      Then help the user explore their topic through open-ended questions.
      Surface what they already know, what interests them, and what tensions exist.
      Do NOT propose a thesis yet — invention precedes commitment.
      Do NOT narrow the topic before the user has explored at least two angles.
      When the user has a rich understanding of the territory, submit this step.
    gates:
      - User has explored at least two angles of the topic
      - Key tensions or questions are identified
    anti_patterns:
      - Proposing a thesis before exploration
      - Narrowing too early

  - id: commit
    title: Commit to a Thesis
    directive_template: >-
      Help the user distill their exploration into a single, arguable thesis statement.
      The thesis must be specific enough to be wrong — vague claims are not theses.
      Present the proposed thesis to the user and ask if it captures their intent.
      Do NOT accept a topic as a thesis (e.g., "climate change" is a topic, not a thesis).
      Do NOT allow more than one main claim — one thesis, one essay.
      Do NOT submit until the user has explicitly confirmed the thesis.
    gates:
      - Thesis is a specific, arguable claim
      - User has committed to the thesis
    anti_patterns:
      - Accepting a topic instead of a thesis
      - Allowing multiple competing claims
      - Submitting without user confirmation

  - id: structure
    title: Arrange the Argument
    directive_template: >-
      Outline the essay's structure: what each section argues and how it supports the thesis.
      Each section should have a clear purpose — no filler sections.
      Present the outline to the user and ask if the structure works for them.
      Do NOT write full prose yet — outlines only.
      Do NOT include sections that do not serve the thesis.
      Do NOT submit until the user confirms the outline.
    gates:
      - Each section has a clear purpose tied to the thesis
      - Logical flow from section to section is evident
      - User has confirmed the outline
    anti_patterns:
      - Including filler sections
      - Writing prose instead of outlining
      - Submitting without user confirmation

  - id: draft
    title: Write the First Draft
    directive_template: >-
      Write the full essay draft following the outline. Prioritize getting ideas down over polish.
      Embrace imperfection — a messy complete draft beats a perfect incomplete one.
      Present the complete draft to the user before submitting.
      Do NOT stop to edit sentences for style while drafting.
      Do NOT leave placeholder sections — write through every part of the outline.
      Do NOT submit until the user has read the draft and confirmed.
    gates:
      - Every outlined section has been drafted
      - Draft is complete end-to-end
      - User has reviewed the draft
    anti_patterns:
      - Editing while drafting
      - Leaving placeholder sections
      - Submitting without showing the draft

  - id: revise
    title: Substantive Revision
    directive_template: >-
      Review the draft for argument strength, evidence gaps, and structural problems.
      Cut, reorder, or rewrite sections that do not earn their place.
      Present the revised version to the user with a summary of what changed and why.
      Do NOT focus on grammar or word choice yet — structure and argument come first.
      Do NOT add new arguments that were not in the outline without revisiting the structure.
      Do NOT submit until the user confirms the revision.
    gates:
      - Argument is logically sound throughout
      - Weak sections are cut or strengthened
      - User has confirmed the revision
    anti_patterns:
      - Line-editing before structural revision
      - Adding unplanned arguments without updating structure
      - Submitting without user confirmation

  - id: polish
    title: Line Editing and Polish
    directive_template: >-
      Edit for clarity, concision, and style. Fix grammar, improve transitions, tighten sentences.
      Read each paragraph aloud (mentally) — if it stumbles, rewrite it.
      Present the polished essay to the user for final approval.
      Do NOT change the argument or structure at this stage.
      Do NOT add new content — polish only what exists.
      Do NOT submit until the user gives final approval.
    gates:
      - Prose is clear and concise
      - Transitions between sections are smooth
      - User has given final approval
    anti_patterns:
      - Changing the argument during polish
      - Adding new content instead of polishing
      - Submitting without user approval
