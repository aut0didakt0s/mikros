# cascade_error.yaml
#
# Four-step workflow proving cascade-error surfacing:
# step_1 emits `flag`; step_2 skips when flag=skip; step_3 refers to
# step_2 via `when_present`; when step_2 is skipped, step_3's precondition
# evaluation raises _SkippedPredecessor → submit_step returns
# `skipped_predecessor_reference` error.

schema_version: "0.3"
name: cascade_error
description: Precondition cascade-error fixture — step_3 refs skipped step_2.
category: analysis_decision
output_format: text

steps:
  - id: step_1
    title: Emit flag
    directive_template: Ask the user for a flag value.
    gates:
      - flag captured
    anti_patterns:
      - Guessing the flag
    collect: true
    output_schema:
      type: object
      required: [flag]
      properties:
        flag:
          type: string
          minLength: 2

  - id: step_2
    title: Conditional step
    directive_template: Conditional work when flag != skip.
    gates:
      - conditional work performed
    anti_patterns:
      - Running when flag is skip
    precondition:
      when_equals:
        ref: step_data.step_1.flag
        value: run

  - id: step_3
    title: Dependent on step_2
    directive_template: Use step_2 output.
    gates:
      - step_2 output used
    anti_patterns:
      - Running without step_2
    precondition:
      when_present: step_data.step_2

  - id: step_4
    title: Finalize
    directive_template: Finalize the flow.
    gates:
      - finalized
    anti_patterns:
      - Skipping finalization
