# branches_precondition_compose_child.yaml
#
# Minimal one-step child used purely to prove the parent's call-step composes
# with upstream branches and an on-call precondition. Final step content
# propagates into parent.step_data[p_call].

schema_version: "0.3"
name: branches_precondition_compose_child
description: Minimal one-step child for branches+precondition+call composition.
category: analysis_decision
output_format: text

steps:
  - id: c1
    title: Child work
    directive_template: Do the child's single chunk of work.
    gates:
      - child chunk done
    anti_patterns:
      - Skipping the chunk
