# call_context_from_child.yaml
#
# First step exists only to receive the parent-extracted context via the
# enter_sub_workflow response `context` field (no templating layer — runtime
# surfaces the seeded string directly).

schema_version: "0.3"
name: call_context_from_child
description: Child that runs against the parent-seeded topic context.
category: analysis_decision
output_format: text

steps:
  - id: c1
    title: Acknowledge topic
    directive_template: Acknowledge the topic provided via seeded context.
    gates:
      - topic acknowledged
    anti_patterns:
      - Ignoring seeded context

  - id: c2
    title: Emit brief
    directive_template: Emit a one-line brief on the topic.
    gates:
      - brief emitted
    anti_patterns:
      - Returning empty content
